# nginx front door for the BOX deployment (HTTP-only).
# TLS terminates at the Cloudflare edge; the Cloudflare Tunnel carries plaintext
# to this origin, so no local certs. Single same-origin front door so the
# relative-path frontend (`/api/*`, `/ws/*`) resolves identically to prod.
# Routing mirrors the original nginx.conf: /api + /ws -> backend, everything else -> frontend.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               image/svg+xml;

    # rate-limit zone MUST be declared in http{} context (the original put it
    # inside a location, which is invalid nginx — never surfaced because the
    # nginx service was never actually started).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:5000; }

    server {
        listen 80;
        server_name _;

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            limit_req zone=api_limit burst=20 nodelay;
        }

        # WebSockets (e.g. /ws/prices, /ws/agent)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400;
        }

        # nginx's own health probe (distinct from backend /api/health)
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Frontend (static SPA served by `serve`)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
