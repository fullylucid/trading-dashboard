name: trading-dashboard
services:
- name: backend
  source:
    type: github
    repo: fullylucid/trading-dashboard
    branch: main
    deploy_on_push: true
  github_deployment_branch: main
  build_command: pip install -r backend/requirements.txt
  run_command: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000
  envs:
  - key: FINNHUB_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: ${FINNHUB_API_KEY}
  - key: SEC_EDGAR_USER_AGENT
    scope: RUN_AND_BUILD_TIME
    value: trading-dashboard schylermcnally@gmail.com
  # Sector-rotation (Phase 2.5) — FRED powers the econ-release catalyst stream
  # (CPI/rates -> financials/REITs/utilities). Free key from fred.stlouisfed.org;
  # the stream degrades gracefully (empty) when unset, so this is optional.
  - key: FRED_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: ${FRED_API_KEY}
  # Compliant User-Agent for the sector-rotation outbound calls (SEC EDGAR 13F /
  # congressional / USAspending / Finnhub). Both default to _DEFAULT_USER_AGENT
  # in-code; set here so all our outbound requests identify the app + a contact.
  - key: SECTOR_ROTATION_USER_AGENT
    scope: RUN_AND_BUILD_TIME
    value: trading-dashboard schylermcnally@gmail.com
  - key: TRADESKEEBOT_USER_AGENT
    scope: RUN_AND_BUILD_TIME
    value: trading-dashboard schylermcnally@gmail.com
  # Where the daily sector-rotation sweep snapshot is persisted; the API route,
  # the digest cron, and the portfolio-scan rotation tags all read this path.
  - key: SECTOR_ROTATION_SNAPSHOT_PATH
    scope: RUN_AND_BUILD_TIME
    value: /tmp/sector_rotation_latest.json
  - key: REDIS_URL
    scope: RUN_AND_BUILD_TIME
    value: ${REDIS_URL}
  - key: LOG_LEVEL
    scope: RUN_AND_BUILD_TIME
    value: INFO
  - key: PYTHONPATH
    scope: RUN_AND_BUILD_TIME
    value: /workspace:/workspace/backend
  http_port: 8000
  source_dir: .
  health_check:
    http_path: /api/health
  internal_ports:
  - 8000

- name: frontend
  source:
    type: github
    repo: fullylucid/trading-dashboard
    branch: main
    deploy_on_push: true
  github_deployment_branch: main
  build_command: npm install && npm run build
  run_command: npx serve -s build -l 5000
  envs:
  - key: REACT_APP_API_URL
    scope: BUILD_TIME
    value: https://${APP_DOMAIN}/api
  http_port: 5000
  source_dir: frontend
  health_check:
    http_path: /
  internal_ports:
  - 5000

databases:
- name: redis
  engine: REDIS
  version: "7"

static_sites: []
