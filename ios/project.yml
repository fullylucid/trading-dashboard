# XcodeGen project spec — run `xcodegen generate` in this folder to produce
# CharlotteDashboard.xcodeproj (keeps the project in version control as plain text,
# so it never drifts and there are no merge-conflict-prone .pbxproj diffs).
name: CharlotteDashboard
options:
  bundleIdPrefix: com.shmaptech
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  CharlotteDashboard:
    type: application
    platform: iOS
    sources:
      - CharlotteDashboard
    info:
      path: CharlotteDashboard/Info.plist
      properties:
        CFBundleDisplayName: Charlotte
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarStyle: UIStatusBarStyleLightContent
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shmaptech.charlotte
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
